name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker build --target app -t script-review-app:latest .
          docker build --target worker -t script-review-worker:latest .
          docker build --target migrator -t script-review-migrator:latest .

      - name: Save images to tar
        run: |
          docker save script-review-app:latest script-review-worker:latest script-review-migrator:latest | gzip > images.tar.gz

      - name: Deploy to server via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "images.tar.gz,docker-compose.prod.yml,.env.production"
          target: "~/script-review"
          overwrite: true

      - name: Execute remote deploy script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/script-review
            docker load < images.tar.gz
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            rm -f images.tar.gz
