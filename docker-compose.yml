services:
  postgres:
    image: postgres:15
    container_name: script-review-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-script_review}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-script_review}
      POSTGRES_DB: ${POSTGRES_DB:-script_review}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: script-review-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
